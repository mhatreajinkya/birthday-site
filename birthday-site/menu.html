<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Choose Your Surprise 🎁</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="menu-page">
    <canvas id="particleCanvas"></canvas>

        <div class="menu-grid">
            <div class="menu-card" onclick="location.href='cake.html'" style="--delay: 0.1s">
                <div class="card-icon">🎂</div>
                <div class="card-content">
                    <h3>Cake Cutting</h3>
                    <p>Let’s celebrate together</p>
                </div>
                <div class="card-arrow">→</div>

            <div class="menu-card" onclick="location.href='gallery.html'" style="--delay: 0.2s">

                    <p>Our beautiful memories</p>
                </div>
                <div class="card-arrow">→</div>

                    <p>Solve our love challenge</p>
                </div>
                <div class="card-arrow">→</div>
            </div>

                </div>
                <div class="card-arrow">→</div>
            </div>

            <div class="menu-card" onclick="location.href='feedback.html'" style="--delay: 0.5s">
                <div class="card-icon">💌</div>

                    <p>Say something for me</p>
                </div>
                <div class="card-arrow">→</div>
            </div>
