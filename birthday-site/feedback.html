<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say Something 💌</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body.feedback-body {
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; padding: 20px;
        }
        .feedback-card {
            position: relative; z-index: 10;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px; padding: 3rem 2.5rem;
            text-align: center; max-width: 440px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: cardEntrance 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        @keyframes cardEntrance {
            from { opacity:0; transform: scale(0.92) translateY(30px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .fb-icon { font-size: 3.2rem; margin-bottom: 12px; }
        .fb-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem; color: white;
            background: linear-gradient(to right, #fff, #ff4baf, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; margin-bottom: 8px;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .fb-subtitle {
            color: rgba(255,255,255,0.5); font-size: 0.88rem; margin-bottom: 22px;
        }
        .fb-textarea {
            width: 100%; padding: 16px 20px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 18px; color: white;
            font-size: 0.97rem; font-family: 'Poppins', sans-serif;
            resize: none; outline: none; line-height: 1.7;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .fb-textarea:focus {
            border-color: #ff4baf;
            box-shadow: 0 0 18px rgba(255,75,175,0.3);
        }
        .fb-textarea::placeholder { color: rgba(255,255,255,0.3); }
        .submit-btn {
            margin-top: 18px; width: 100%; padding: 15px;
            background: linear-gradient(45deg, #ff4b5c, #ff4baf);
            color: white; border: none; border-radius: 50px;
            font-family: 'Poppins', sans-serif; font-weight: 600;
            font-size: 1rem; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,75,175,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(255,75,175,0.55); }

        /* THANKS */
        #thanks-screen {
            display: none;
            animation: cardEntrance 0.8s ease forwards;
        }
        .thanks-icon {
            font-size: 4rem; margin-bottom: 16px;
            display: inline-block;
            animation: heartBeat 1.2s ease-in-out infinite;
        }
        @keyframes heartBeat {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.15); }
        }
        .thanks-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.3rem; color: white;
            text-shadow: 0 0 20px rgba(255,75,175,0.6);
            margin-bottom: 16px;
        }
        .thanks-msg {
            font-style: italic;
            color: rgba(255,255,255,0.7);
            line-height: 1.8; font-size: 0.95rem;
            padding: 14px 18px;
            background: rgba(255,75,175,0.08);
            border-left: 3px solid #ff4baf;
            border-radius: 0 12px 12px 0;
            text-align: left; margin-bottom: 20px;
        }
        .back-btn {
            display: inline-block;
            padding: 13px 30px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; text-decoration: none;
            border-radius: 50px; font-size: 0.9rem;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); }
    </style>
</head>
<body class="feedback-body">
    <canvas id="particleCanvas"></canvas>
    <a href="menu.html" class="floating-home">🏠 Home</a>

    <div class="feedback-card">
        <!-- Form -->
        <div id="feedback-form">
            <div class="fb-icon">💌</div>
            <div class="fb-title">Say Something</div>
            <div class="fb-subtitle">Write something sweet for me ❤️</div>
            <textarea
                id="message" class="fb-textarea" rows="5"
                placeholder="Type your message here... every word means the world to me 💕"
            ></textarea>
            <button class="submit-btn" onclick="submitFeedback()">Send with Love 💖</button>
        </div>

        <!-- Thanks -->
        <div id="thanks-screen">
            <div class="thanks-icon">🥰</div>
            <div class="thanks-title">Saved with Love</div>
            <div class="thanks-msg" id="thanks-preview"></div>
            <a href="menu.html" class="back-btn">← Back to Surprises</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function submitFeedback() {
            var msg = document.getElementById('message').value.trim();
            if (!msg) {
                var ta = document.getElementById('message');
                ta.style.borderColor = '#ff6b6b';
                ta.placeholder = 'Please write something first 💕';
                setTimeout(function() { ta.style.borderColor = ''; }, 1200);
                return;
            }
            document.getElementById('feedback-form').style.display = 'none';
            document.getElementById('thanks-preview').textContent = '"' + msg + '"';
            document.getElementById('thanks-screen').style.display = 'block';
        }
    </script>
</body>
</html>
